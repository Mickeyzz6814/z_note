name: Release Build


on:

  workflow_dispatch:



permissions:

  contents: write



jobs:


  build:


    runs-on: ubuntu-latest



    steps:


    # 拉取代码

    - name: Checkout

      uses: actions/checkout@v5




    # Flutter 环境

    # 改成你本地 flutter --version 对应版本

    - name: Setup Flutter

      uses: subosito/flutter-action@v2

      with:

        flutter-version: "3.44.4"

        channel: stable

        cache: true




    # 读取版本号

    - name: Get Version

      id: version

      run: |


        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')


        NAME=$(echo $VERSION | cut -d'+' -f1)


        CODE=$(echo $VERSION | cut -d'+' -f2)



        echo "name=$NAME" >> $GITHUB_OUTPUT

        echo "code=$CODE" >> $GITHUB_OUTPUT





    # 创建签名文件

    - name: Create Keystore

      run: |


        echo "${{ secrets.KEYSTORE_BASE64 }}" \
        | base64 --decode \
        > android/app/release.jks



        cat <<EOF > android/key.properties


        storePassword=${{ secrets.STORE_PASSWORD }}


        keyPassword=${{ secrets.KEY_PASSWORD }}


        keyAlias=${{ secrets.KEY_ALIAS }}


        storeFile=release.jks


        EOF





    # 获取依赖

    - name: Flutter Pub Get

      run: |

        flutter pub get





    # 生成全架构 APK

    - name: Build Universal APK

      run: |


        flutter build apk \

        --release \

        --obfuscate \

        --split-debug-info=build/debug-info





    # 生成分架构 APK

    - name: Build Split APK

      run: |


        flutter build apk \

        --release \

        --split-per-abi \

        --obfuscate \

        --split-debug-info=build/debug-info





    # 创建 GitHub Release

    - name: Create GitHub Release

      uses: softprops/action-gh-release@v2


      with:


        tag_name: v${{ steps.version.outputs.name }}


        name: Z Note v${{ steps.version.outputs.name }}


        body: |

          Z Note Release

          Version: ${{ steps.version.outputs.name }}

          Version Code: ${{ steps.version.outputs.code }}



        files: |


          build/app/outputs/flutter-apk/app-release.apk


          build/app/outputs/flutter-apk/app-arm64-v8a-release.apk


          build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk


          build/app/outputs/flutter-apk/app-x86_64-release.apk
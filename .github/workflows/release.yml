name: Release Build


on:

  workflow_dispatch:



permissions:

  contents: write



jobs:


  build:


    runs-on: ubuntu-latest



    steps:


    # 拉取代码
    - name: Checkout

      uses: actions/checkout@v5




    # 安装 Flutter
    # 改成你的本地 Flutter 版本
    - name: Setup Flutter

      uses: subosito/flutter-action@v2

      with:

        flutter-version: "3.38.0"

        channel: stable

        cache: true




    # 读取 pubspec.yaml 版本号

    - name: Get Version

      id: version

      run: |


        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')


        NAME=$(echo $VERSION | cut -d'+' -f1)


        CODE=$(echo $VERSION | cut -d'+' -f2)


        echo "name=$NAME" >> $GITHUB_OUTPUT


        echo "code=$CODE" >> $GITHUB_OUTPUT





    # 生成正式签名文件

    - name: Create Keystore


      run: |


        echo "${{ secrets.KEYSTORE_BASE64 }}" \
        | base64 --decode \
        > android/release.jks



        cat <<EOF > android/key.properties


        storePassword=${{ secrets.STORE_PASSWORD }}


        keyPassword=${{ secrets.KEY_PASSWORD }}


        keyAlias=${{ secrets.KEY_ALIAS }}


        storeFile=release.jks


        EOF





    # 获取依赖

    - name: Flutter Pub Get


      run: |


        flutter pub get





    # 构建 APK

    - name: Build APK


      env:

        USE_RELEASE_KEYSTORE: true


      run: |


        flutter build apk \

        --release \

        --obfuscate \

        --split-debug-info=build/debug-info





    # 构建 AAB

    - name: Build AAB


      env:

        USE_RELEASE_KEYSTORE: true


      run: |


        flutter build appbundle \

        --release \

        --obfuscate \

        --split-debug-info=build/debug-info





    # 创建 GitHub Release

    - name: Create Release


      uses: softprops/action-gh-release@v2


      with:


        tag_name: v${{ steps.version.outputs.name }}


        name: Z Note v${{ steps.version.outputs.name }}


        body: |


          Z Note Release v${{ steps.version.outputs.name }}


          Version Code: ${{ steps.version.outputs.code }}


        files: |


          build/app/outputs/flutter-apk/app-release.apk


          build/app/outputs/bundle/release/app-release.aab
name: z_note
description: "A simple, easy-to-use note-taking app built with Flutter and Material Design 3."
publishing_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.0
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "lib/assets/images/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/assets/images/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/icon/icon.png